name: Python uv CI

on:
  push:
    paths-ignore:
      - "**.md"
  pull_request:
    paths-ignore:
      - "**.md"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  test:
    name: uv test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # If private dependencies are configured, do not expose the GitHub App
    # private key / installation token to forked PR code.
    #
    # Repos without private dependencies can still run CI on forked PRs.
    if: ${{ vars.APP_TOKEN_REPOSITORIES == '' || github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    permissions:
      contents: read

    steps:
      - name: Validate private dependency configuration
        if: ${{ vars.APP_TOKEN_REPOSITORIES != '' }}
        env:
          APP_CLIENT_ID: ${{ vars.APP_CLIENT_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          APP_TOKEN_REPOSITORIES: ${{ vars.APP_TOKEN_REPOSITORIES }}
        run: |
          test -n "$APP_CLIENT_ID" || { echo "::error::Missing variable APP_CLIENT_ID because APP_TOKEN_REPOSITORIES was provided"; exit 1; }
          test -n "$APP_PRIVATE_KEY" || { echo "::error::Missing secret APP_PRIVATE_KEY because APP_TOKEN_REPOSITORIES was provided"; exit 1; }
          test -n "$APP_TOKEN_REPOSITORIES" || { echo "::error::Missing variable APP_TOKEN_REPOSITORIES"; exit 1; }

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Create GitHub App token
        if: ${{ vars.APP_TOKEN_REPOSITORIES != '' }}
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ vars.APP_TOKEN_REPOSITORIES }}
          permission-contents: read
          skip-token-revoke: false

      - name: Sync dependencies
        if: ${{ vars.APP_TOKEN_REPOSITORIES == '' }}
        run: uv sync --frozen

      - name: Sync dependencies with private GitHub access
        if: ${{ vars.APP_TOKEN_REPOSITORIES != '' }}
        run: |
          token='${{ steps.app-token.outputs.token }}'

          GIT_TERMINAL_PROMPT=0 \
          GIT_CONFIG_COUNT=1 \
          GIT_CONFIG_KEY_0="url.https://x-access-token:${token}@github.com/.insteadOf" \
          GIT_CONFIG_VALUE_0="https://github.com/" \
          uv sync --frozen

          unset token

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy

      - name: Run tests
        run: uv run pytest --cov --cov-report=term-missing --cov-report=markdown:coverage-report.md

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: ${{ github.event_name == 'pull_request' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
        with:
          name: coverage-markdown
          path: coverage-report.md
          if-no-files-found: error
          retention-days: 1

      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci

  coverage-report:
    name: Publish Coverage
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: ${{ needs.test.result == 'success' && (github.event_name == 'pull_request' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) }}

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download Coverage Artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-markdown

      - name: Publish to Job Summary
        run: |
          echo "## 📊 Code Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          cat coverage-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Add Coverage PR Comment
        uses: actions/github-script@v7
        if: ${{ github.event_name == 'pull_request' }}
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('coverage-report.md', 'utf8');
            const marker = '<!-- coverage-report -->';
            const body = `${marker}\n## 📊 Code Coverage Report\n\n${report}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(
              comment => comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }