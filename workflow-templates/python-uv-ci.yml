name: Python uv CI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: uv test
    runs-on: ubuntu-latest

    steps:
      - name: Validate required configuration
        env:
          APP_CLIENT_ID: ${{ vars.APP_CLIENT_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          APP_TOKEN_REPOSITORIES: ${{ vars.APP_TOKEN_REPOSITORIES }}
        run: |
          test -n "$APP_CLIENT_ID" || (echo "::error::Missing variable APP_CLIENT_ID" && exit 1)
          test -n "$APP_PRIVATE_KEY" || (echo "::error::Missing secret APP_PRIVATE_KEY" && exit 1)
          test -n "$APP_TOKEN_REPOSITORIES" || (echo "::error::Missing variable APP_TOKEN_REPOSITORIES" && exit 1)

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Create GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ vars.APP_TOKEN_REPOSITORIES }}

      - name: Configure Git auth for private dependencies
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy

      - name: Run tests
        run: uv run pytest --cov --cov-report=term-missing --cov-report=markdown:coverage-report.md

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          name: coverage-markdown
          path: coverage-report.md
          if-no-files-found: error
          retention-days: 1

      - name: Cleanup Git auth
        if: always()
        run: git config --global --unset-all url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf || true

      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci

  coverage-report:
    name: Publish Coverage
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download Coverage Artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-markdown

      - name: Publish to Job Summary
        run: |
          echo "## 📊 Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          cat coverage-report.md >> $GITHUB_STEP_SUMMARY

      - name: Add Coverage PR Comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('coverage-report.md', 'utf8');
            const marker = '<!-- coverage-report -->';
            const body = `${marker}\n## 📊 Code Coverage Report\n\n${report}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(
              comment => comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }