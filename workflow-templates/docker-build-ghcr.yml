name: Build

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build and publish image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write

    steps:
      - name: Validate private dependency configuration
        env:
          APP_CLIENT_ID: ${{ vars.APP_CLIENT_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          APP_TOKEN_REPOSITORIES: ${{ vars.APP_TOKEN_REPOSITORIES }}
        run: |
          test -n "$APP_CLIENT_ID" || { echo "::error::Missing variable APP_CLIENT_ID"; exit 1; }
          test -n "$APP_PRIVATE_KEY" || { echo "::error::Missing secret APP_PRIVATE_KEY"; exit 1; }
          test -n "$APP_TOKEN_REPOSITORIES" || { echo "::error::Missing variable APP_TOKEN_REPOSITORIES"; exit 1; }

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Create GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ vars.APP_TOKEN_REPOSITORIES }}
          permission-contents: read
          skip-token-revoke: false

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }}
            ghcr.io/${{ github.repository }}:latest
          secrets: |
            github_token=${{ steps.app-token.outputs.token }}